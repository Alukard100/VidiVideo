services:
  api:
    build:
      context: .
      dockerfile: Backend/src/VidiVideo.Api/Dockerfile
    env_file:
      - .env
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - rabbitmq

  worker:
    build:
      context: .
      dockerfile: Backend/src/VidiVideo.Worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - sqlserver
      - rabbitmq

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: vidivideo
      RABBITMQ_DEFAULT_PASS: vidivideo
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  sqlserver-data:
